<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Suivi des sacs poubelle - Douarnenez</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <main class="dashboard">
        <section class="panel search-panel">
          <header class="search-brand">
            <div class="search-brand-block">
              <img
                class="brand-logo"
                src="/images/logo.png"
                alt="Logo Douarnenez sacs poubelle"
              />
              <div class="panel-head search-brand-head">
                <h2>Recherche</h2>
                <button type="button" class="button button-warning" id="reset-search">
                  Tout effacer
                </button>
              </div>
            </div>
          </header>

          <form id="search-form" class="search-form" novalidate>
            <div class="search-field">
              <label for="search-last-name">Nom</label>
              <input
                id="search-last-name"
                name="name"
                type="text"
                placeholder="Le Goff"
                autocomplete="off"
              />
              <div class="suggestion-menu" id="last-name-menu"></div>
            </div>

            <div class="search-field">
              <label for="search-first-name">Prenom</label>
              <input
                id="search-first-name"
                name="first_name"
                type="text"
                placeholder="Jeanne"
                autocomplete="off"
              />
              <div class="suggestion-menu" id="first-name-menu"></div>
            </div>

            <div class="search-field">
              <label for="search-address">Adresse</label>
              <input
                id="search-address"
                name="address"
                type="text"
                placeholder="Quai du Rosmeur"
                autocomplete="off"
              />
              <div class="suggestion-menu" id="address-menu"></div>
            </div>
          </form>

          <section class="stock-panel" aria-labelledby="stock-panel-title">
            <div class="panel-head compact stock-head">
              <div>
                <h2 id="stock-panel-title">Stock sacs</h2>
              </div>
              <span class="panel-chip" id="stock-health-chip">Chargement</span>
            </div>

            <div class="stock-grid">
              <article class="stock-card stock-card-black">
                <span>Sacs noirs</span>
                <strong id="stock-black-count">0</strong>
              </article>
              <article class="stock-card stock-card-yellow">
                <span>Sacs jaunes</span>
                <strong id="stock-yellow-count">0</strong>
              </article>
            </div>

            <form id="stock-form" class="stock-form" novalidate>
              <div class="stock-form-grid">
                <label>
                  Ajouter noir
                  <input
                    name="black_bags"
                    type="number"
                    min="0"
                    step="1"
                    value="0"
                    inputmode="numeric"
                  />
                </label>
                <label>
                  Ajouter jaune
                  <input
                    name="yellow_bags"
                    type="number"
                    min="0"
                    step="1"
                    value="0"
                    inputmode="numeric"
                  />
                </label>
              </div>
              <div class="stock-actions">
                <button type="submit" class="button button-secondary">Ajouter au stock</button>
                <p class="stock-status" id="stock-status" aria-live="polite"></p>
              </div>
            </form>
          </section>

          <div class="metric-strip">
            <article class="metric-card">
              <span>Habitants</span>
              <strong id="resident-count-metric">0</strong>
            </article>
            <article class="metric-card">
              <span>Adresses</span>
              <strong id="address-count-metric">0</strong>
            </article>
            <article class="metric-card">
              <span>Voies</span>
              <strong id="street-count-metric">0</strong>
            </article>
            <article class="metric-card">
              <span>Import BAN</span>
              <strong id="imported-count-metric">0</strong>
            </article>
          </div>
        </section>

        <section class="detail-stack is-support-hidden" id="detail-stack">
          <section class="panel detail-panel">
            <div class="results-view" id="results-view">
              <div class="results-head">
                <div>
                  <h2 id="results-title">Resultats</h2>
                </div>
                <div class="results-meta">
                  <strong id="results-count">0</strong>
                  <span id="results-caption"></span>
                </div>
              </div>
              <div class="resident-results" id="resident-results"></div>
            </div>
            <div id="resident-detail" class="resident-detail-shell is-hidden"></div>
          </section>

          <section class="panel support-panel is-hidden" id="support-panel">
            <div class="support-columns">
              <section class="support-column household-panel">
                <div class="panel-head compact support-head">
                  <div class="support-title-block">
                    <h2>Foyer</h2>
                    <div class="address-context" id="address-context">
                      <p class="detail-subtitle support-subtitle">Aucune adresse.</p>
                    </div>
                  </div>
                  <span class="panel-chip" id="household-count-chip">0</span>
                </div>
                <div class="household-list" id="household-list"></div>
              </section>

              <section class="support-column map-panel">
                <div class="mini-map-shell" id="map-shell">
                  <div id="map"></div>
                </div>
              </section>
            </div>
          </section>
        </section>
      </main>
    </div>

    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
      defer
    ></script>
    <script src="/app.js" defer></script>
  </body>
</html>
